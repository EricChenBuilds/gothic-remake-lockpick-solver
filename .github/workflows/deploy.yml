name: Cloudflare Pages CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # 强行锁定 Node 版本，顺便把那个讨厌的 Deprecated 警告干掉

      - name: List Files (Debug)
        run: ls -la

      # 放弃 wrangler-action 的死板参数，改用原生 Bash 运行，顺滑无 Bug
      - name: Publish to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler pages deploy . --project-name=gothic-remake-lock-solver