name: Cloudflare Pages CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 【新增步骤】打印一下当前目录下的文件，看看是不是空文件夹
      - name: List Files (Debug)
        run: ls -la

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # 【核心修改】去掉了内置的 deploy 参数，改用下面的常规 command，方便捕获最底层的具体错误
          command: pages deploy . --project-name=gothic-remake-lock-solver  # ⚠️记得把这里改成你网页后台建好的项目名！